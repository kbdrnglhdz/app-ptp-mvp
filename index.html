<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Maestro Pro | Orlando Rangel Compeán</title>
    <meta name="description" content="Planificador de tareas premium construido con React y Glassmorphism.">
    
    <!-- Dependencies via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">

    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-white: #f8fafc;
            --text-muted: #94a3b8;
            --priority-high: #ef4444;
            --priority-medium: #f59e0b;
            --priority-low: #10b981;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        #root { width: 100%; max-width: 1100px; }

        .app-container { display: flex; flex-direction: column; gap: 2rem; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }

        .stats-bar { display: flex; gap: 1.5rem; padding: 1.2rem; background: var(--bg-card); border-radius: 1.25rem; backdrop-filter: blur(10px); border: 1px solid var(--glass-border); margin-bottom: 1.5rem; box-shadow: var(--glass-shadow); }
        .stat-item { display: flex; flex-direction: column; }
        .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }

        .controls { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .add-btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; padding: 0.8rem 1.4rem; border-radius: 0.8rem; font-weight: 600; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5); }

        select, input, textarea { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); color: white; padding: 0.7rem; border-radius: 0.6rem; font-family: inherit; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        
        .task-card { background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.25rem; padding: 1.5rem; transition: var(--transition); box-shadow: var(--glass-shadow); position: relative; overflow: hidden; border-left: 5px solid transparent; }
        .task-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        .priority-alta { border-left-color: var(--priority-high); }
        .priority-media { border-left-color: var(--priority-medium); }
        .priority-baja { border-left-color: var(--priority-low); }

        .category-tag { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.75rem; border: 1px solid rgba(99, 102, 241, 0.2); margin-bottom: 0.8rem; display: inline-block; }
        .task-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .task-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.2rem; }
        .task-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--glass-border); font-size: 0.8rem; color: var(--text-muted); }
        
        .action-btns { display: flex; gap: 0.5rem; }
        .action-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); padding: 0.4rem 0.7rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem; transition: var(--transition); }
        .action-btn:hover { background: rgba(255,255,255,0.15); }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; border-color: #ef4444; }

        .form-overlay { background: var(--bg-card); padding: 2rem; border-radius: 1.5rem; border: 1px solid var(--glass-border); margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem('planner_tasks_consolidated');
                return saved ? JSON.parse(saved) : [
                    { id: 1, title: "Estrenar Planificador", description: "Explora las funcionalidades de tu nueva herramienta de gestión personal.", category: "Personal", priority: "Alta", status: "Pendiente", dueDate: "2024-04-01" },
                    { id: 2, title: "Configurar Categorías", description: "Organiza tus tareas por Trabajo, Diseño o Desarrollo.", category: "Trabajo", priority: "Media", status: "In Progreso", dueDate: "2024-04-02" }
                ];
            });

            const [filter, setFilter] = useState('Todas');
            const [showForm, setShowForm] = useState(false);
            const [newTask, setNewTask] = useState({ title: '', description: '', category: 'Trabajo', priority: 'Media', dueDate: '' });

            useEffect(() => {
                localStorage.setItem('planner_tasks_consolidated', JSON.stringify(tasks));
            }, [tasks]);

            const addTask = (e) => {
                e.preventDefault();
                if (!newTask.title) return;
                setTasks([{ ...newTask, id: Date.now(), status: 'Pendiente' }, ...tasks]);
                setNewTask({ title: '', description: '', category: 'Trabajo', priority: 'Media', dueDate: '' });
                setShowForm(false);
            };

            const toggleStatus = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, status: t.status === 'Completado' ? 'Pendiente' : 'Completado' } : t));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            const filtered = filter === 'Todas' ? tasks : tasks.filter(t => t.category === filter || t.status === filter);

            return (
                <div className="app-container">
                    <header>
                        <h1>Planificador Maestro Pro</h1>
                        <p style={{color: 'var(--text-muted)', marginBottom: '1.5rem'}}>Gestión Inteligente de Orlando Rangel Compeán</p>
                        
                        <div className="stats-bar">
                            <div className="stat-item"><span className="stat-value">{tasks.length}</span><span className="stat-label">Total</span></div>
                            <div className="stat-item"><span className="stat-value">{tasks.filter(t=>t.status==='Completado').length}</span><span className="stat-label">Hechas</span></div>
                            <div className="stat-item"><span className="stat-value">{tasks.filter(t=>t.priority==='Alta').length}</span><span className="stat-label">Urgentes</span></div>
                        </div>
                    </header>

                    <div className="controls">
                        <button className="add-btn" onClick={() => setShowForm(!showForm)}>
                            {showForm ? '✖ Cancelar' : '✚ Nueva Tarea'}
                        </button>
                        <select value={filter} onChange={e => setFilter(e.target.value)}>
                            <option value="Todas">Filtro: Todos</option>
                            <option value="Trabajo">Trabajo</option>
                            <option value="Personal">Personal</option>
                            <option value="Completado">Hechas</option>
                            <option value="Pendiente">Pendientes</option>
                        </select>
                    </div>

                    {showForm && (
                        <form className="form-overlay" onSubmit={addTask}>
                            <input type="text" placeholder="Título..." value={newTask.title} onChange={e=>setNewTask({...newTask, title: e.target.value})} required />
                            <textarea placeholder="Descripción..." value={newTask.description} onChange={e=>setNewTask({...newTask, description: e.target.value})} />
                            <div style={{display: 'flex', gap: '0.5rem'}}>
                                <select value={newTask.category} onChange={e=>setNewTask({...newTask, category: e.target.value})} style={{flex: 1}}>
                                    <option value="Trabajo">Trabajo</option>
                                    <option value="Personal">Personal</option>
                                </select>
                                <select value={newTask.priority} onChange={e=>setNewTask({...newTask, priority: e.target.value})} style={{flex: 1}}>
                                    <option value="Baja">Prioridad Baja</option>
                                    <option value="Media">Prioridad Media</option>
                                    <option value="Alta">Prioridad Alta</option>
                                </select>
                            </div>
                            <input type="date" value={newTask.dueDate} onChange={e=>setNewTask({...newTask, dueDate: e.target.value})} />
                            <button type="submit" className="add-btn">Guardar Tarea</button>
                        </form>
                    )}

                    <main className="dashboard-grid">
                        {filtered.map(task => (
                            <div key={task.id} className={`task-card priority-${task.priority.toLowerCase()}`}>
                                <span className="category-tag">{task.category}</span>
                                <h2 className="task-title" style={{textDecoration: task.status === 'Completado' ? 'line-through' : 'none', opacity: task.status === 'Completado' ? 0.5 : 1}}>
                                    {task.title}
                                </h2>
                                <p className="task-desc">{task.description}</p>
                                <div className="task-footer">
                                    <span>📅 {task.dueDate || 'Sin fecha'}</span>
                                    <div className="action-btns">
                                        <button className="action-btn" onClick={() => toggleStatus(task.id)}>
                                            {task.status === 'Completado' ? 'Reabrir' : 'Hecho'}
                                        </button>
                                        <button className="action-btn btn-delete" onClick={() => deleteTask(task.id)}>Borrar</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
